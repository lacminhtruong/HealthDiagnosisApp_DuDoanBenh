<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#071a2b">
    <title>{% block title %}HealthDiagnosis AI{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="page-shell topbar-inner">
            <a class="brand" href="{{ url_for('index') }}">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 21s-7-4.35-7-11a4 4 0 0 1 7-2.65A4 4 0 0 1 19 10c0 6.65-7 11-7 11Z"/>
                        <path d="M8.5 12h2l1-2.5 1.5 5 1-2.5h2"/>
                    </svg>
                </span>
                <span class="brand-copy">
                    <strong>HealthDiagnosis</strong>
                    <small>Clinical decision support</small>
                </span>
            </a>

            <nav class="topbar-nav" aria-label="Điều hướng chính">
                <a href="{{ url_for('index') }}">Chẩn đoán</a>
                <span class="nav-divider"></span>
                <span class="model-badge">KNN · 184 features</span>
                <span class="online-badge"><i></i>Model sẵn sàng</span>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="page-shell footer-inner">
            <span>HealthDiagnosis AI</span>
            <p>Kết quả chỉ mang tính tham khảo, không thay thế chẩn đoán của bác sĩ.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/site.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
